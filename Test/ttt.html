<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center font-sans relative">

    <div class="absolute top-6 left-6 right-6 flex justify-between items-center text-sm">
        <a href="index.html" class="text-slate-400 hover:text-white transition">← Exit to Hub</a>
        <button onclick="toggleFullscreen()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-xs font-semibold tracking-wide transition">
            Toggle Fullscreen
        </button>
    </div>

    <div class="text-center max-w-sm w-full px-6">
        <span id="timerStatus" class="text-xs uppercase tracking-widest text-emerald-400 font-bold bg-emerald-500/10 px-3 py-1 rounded-full">
            Focus Session
        </span>
        
        <h1 id="timerDisplay" class="text-8xl font-mono font-bold my-6 select-none tracking-tighter">25:00</h1>
        
        <div class="flex gap-3 mb-8">
            <button id="actionBtn" onclick="toggleTimer()" class="flex-1 bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3.5 rounded-xl shadow-lg text-sm transition font-semibold">
                Click to Open & Start Focus
            </button>
            <button onclick="resetTimer()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-6 py-3.5 rounded-xl text-sm transition font-semibold">
                Reset
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 border-t border-slate-900 pt-6 text-left">
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1">Study (Mins)</label>
                <input type="number" id="studyInput" value="25" min="1" max="180" onchange="applyCustomDurations()" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-sm font-mono text-white focus:outline-none">
            </div>
            <div>
                <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-1">Break (Mins)</label>
                <input type="number" id="breakInput" value="5" min="1" max="60" onchange="applyCustomDurations()" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-3 py-2 text-sm font-mono text-white focus:outline-none">
            </div>
        </div>
    </div>

    <script>
        let timer, soundTimer;
        let isRunning = false;
        let isBreakPhase = false;
        let timeRemaining = 25 * 60; 

        // Audio API configuration targets (Uses local downloaded files)
        const focusEndAudio = new Audio('focus-end.mp3');
        const breakEndAudio = new Audio('break-end.mp3');

        // Automatically prompt for permission alerts when the screen content loads
        document.addEventListener('DOMContentLoaded', () => {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
        });

        function applyCustomDurations() {
            if (isRunning) return; 
            const studyMins = parseInt(document.getElementById('studyInput').value) || 25;
            const breakMins = parseInt(document.getElementById('breakInput').value) || 5;
            timeRemaining = (isBreakPhase ? breakMins : studyMins) * 60;
            updateDisplay();
        }

        function toggleTimer() {
            const btn = document.getElementById('actionBtn');
            const status = document.getElementById('timerStatus');
            
            // Fullscreen trigger rules on first click handling
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log("Handled."));
            }

            stopAlarmPlayback();
            
            if (isRunning) {
                clearInterval(timer);
                isRunning = false;
                btn.innerText = isBreakPhase ? "Resume Break" : "Resume Focus";
            } else {
                isRunning = true;
                btn.innerText = "Pause Session";
                
                timer = setInterval(() => {
                    timeRemaining--;
                    updateDisplay();
                    
                    if (timeRemaining <= 0) {
                        clearInterval(timer);
                        isRunning = false;
                        
                        const studyMins = parseInt(document.getElementById('studyInput').value) || 25;
                        const breakMins = parseInt(document.getElementById('breakInput').value) || 5;
                        
                        if (!isBreakPhase) {
                            isBreakPhase = true;
                            timeRemaining = breakMins * 60;
                            status.innerText = "Break Time!";
                            status.className = "text-xs uppercase tracking-widest text-rose-400 font-bold bg-rose-500/10 px-3 py-1 rounded-full";
                            btn.innerText = "Start Break";
                            
                            playAlarmLoop(focusEndAudio);
                            triggerNotification("Focus Complete!", "Time to step away and take your break.");
                        } else {
                            isBreakPhase = false;
                            timeRemaining = studyMins * 60;
                            status.innerText = "Focus Session";
                            status.className = "text-xs uppercase tracking-widest text-emerald-400 font-bold bg-emerald-500/10 px-3 py-1 rounded-full";
                            btn.innerText = "Start Focus";
                            
                            playAlarmLoop(breakEndAudio);
                            triggerNotification("Break Over!", "Let's dive back in and focus.");
                        }
                        updateDisplay();
                    }
                }, 1000);
            }
        }

        // Reset Engine Logic
        function resetTimer() {
            clearInterval(timer);
            stopAlarmPlayback();
            
            isRunning = false;
            isBreakPhase = false;
            
            // Reset UI States
            const status = document.getElementById('timerStatus');
            const btn = document.getElementById('actionBtn');
            
            status.innerText = "Focus Session";
            status.className = "text-xs uppercase tracking-widest text-emerald-400 font-bold bg-emerald-500/10 px-3 py-1 rounded-full";
            btn.innerText = "Click to Open & Start Focus";
            
            // Recalculate back to base input levels
            applyCustomDurations();
        }

        // Handles looping media pipelines precisely for 60 seconds
        function playAlarmLoop(audioElement) {
            stopAlarmPlayback(); 
            audioElement.currentTime = 0;
            audioElement.loop = true;
            audioElement.play().catch(e => console.log("Audio waiting for system activation rules."));
            
            soundTimer = setTimeout(() => {
                audioElement.pause();
                audioElement.currentTime = 0;
            }, 60000);
        }

        function stopAlarmPlayback() {
            clearTimeout(soundTimer);
            focusEndAudio.pause();
            breakEndAudio.pause();
        }

        function triggerNotification(title, msg) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, { body: msg, icon: "https://cdn-icons-png.flaticon.com/512/2921/2921222.png" });
            } else {
                alert(`${title}\n${msg}`);
            }
        }

        function updateDisplay() {
            const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const secs = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${mins}:${secs}`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log("Blocked"));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
