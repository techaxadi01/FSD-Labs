<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/svg+xml" href="../logo.svg?v=1">
    <title>EduFlow - Login</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Smooth Scrolling -->
    <style>
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>


<body class="bg-gradient-to-b from-white via-emerald-50/30 to-slate-50 text-slate-800">

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50
        bg-gradient-to-r from-emerald-600 via-green-500 to-teal-500
        shadow-xl">

        <div class="max-w-7xl mx-auto px-6">

            <div class="flex justify-between items-center h-20">

                <!-- LOGO -->
                <a href="index.html" class="flex items-center gap-3">
                    <span class="text-3xl font-bold text-white">
                        <i class="fas fa-graduation-cap text-xl"></i> EduFlow
                    </span>
                </a>

                <!-- Buttons -->
                <div class="hidden md:flex gap-3">

                    <!--
                    <a href="login.html"
                        class="px-5 py-2 rounded-xl
                        border border-white/100
                        bg-white/30
                        text-white-500
                        font-semibold
                        hover:bg-teal-500/75
                        hover:border-white/100
                        hover:scale-105
                        transition">

                        Login

                    </a>
                    -->

                    <a href="signup.html"
                        class="px-5 py-2 rounded-xl
                        bg-white
                        text-emerald-600
                        font-semibold
                        hover:scale-105
                        transition">

                        Get Started
                        
                    </a>
                </div>
            </div>
        </div>    
    </nav>
        
    <div class="bg-gradient-to-br from-teal-100 to-emerald-200 min-h-screen flex items-center justify-center p-4">
        
        <!-- Login Box -->
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-8 border border-emerald-100">
            
            <!-- Header -->
            <div class="text-center mb-8 text-xl font-bold">
                <p class="text-gray-500">Welcome back!</p>
            </div>
            
            <!-- Message -->
            <div class="text-center mb-7">
                <p id="message" class="text-medium text-center font-semibold"></p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="space-y-5">
                <!-- Username Input -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username or Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="userIdentifier" placeholder="Username or Email" required
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition">
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" placeholder="Password" required 
                            class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200 transition">
                    </div>
                </div>

                <!-- Additional Options -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-600 cursor-pointer">
                        <input type="checkbox" class="rounded text-emerald-600 focus:ring-emerald-500 border-gray-300 w-4 h-4">
                        Remember me
                    </label>
                    <a href="#" class="text-emerald-600 hover:underline font-medium">Forgot password?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-emerald-600 to-green-500 text-white font-semibold py-3 rounded-xl shadow-lg hover:from-emerald-700 hover:to-green-600 transition duration-300 transform hover:-translate-y-0.5">
                    Sign In
                </button>
            </form>

            <!-- Additional Options -->
            <p class="text-center text-sm text-gray-600 mt-8">
                Don't have an account? 
                <a href="signup.html" class="text-emerald-600 font-bold hover:underline">Get Started</a>
            </p>
        </div>
    </div>

    <!-- Interface Script -->
    <script src="app.js"></script>
</body>
</html>
