<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFlow - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-sm">
        <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">EduFlow Login</h2>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="userIdentifier" placeholder="Username or Email" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5">
            <input type="password" id="password" placeholder="Password" required class="w-full bg-slate-50 border border-slate-300 rounded-xl px-4 py-2.5">
            <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-500 transition">Sign In</button>
        </form>
        <p id="message" class="mt-4 text-xs text-center font-bold"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
